            - generic [ref=e53]: How does Ambr AI work?
            - img [ref=e54]
          - paragraph [ref=e57]:
            - text: Choose a scenario from the pre-built library or use one customized for your organization. Have a realistic voice conversation with an AI character. Receive detailed, personalized feedback afterward. The AI adapts to tone, approach, and responses in real time.
